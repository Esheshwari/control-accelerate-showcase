<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Control & Accelerate India | Industrial Safety Systems</title>

    <meta name="description" content="We provide reliable electrical and mechanical solutions for industries that demand consistent performance. Designed for real-world conditions, our systems ensure durability, safety, and efficiency." />

  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- ✅ Chatbase Chatbot (correct place) -->
    <script>
    (function(){
      if(!window.chatbase || window.chatbase("getState") !== "initialized"){
        window.chatbase = (...args) => {
          if(!window.chatbase.q){ window.chatbase.q = [] }
          window.chatbase.q.push(args)
        };
        window.chatbase = new Proxy(window.chatbase,{
          get(target,prop){
            if(prop === "q"){ return target.q }
            return (...args)=>target(prop,...args)
          }
        })
      }

      const onLoad = function(){
        const script = document.createElement("script");
        script.src = "https://www.chatbase.co/embed.min.js";
        script.id = "NvVCFME8RJixQvVFG_CSq";
        script.domain = "www.chatbase.co";
        document.body.appendChild(script);
      };

      if(document.readyState === "complete"){
        onLoad();
      } else {
        window.addEventListener("load", onLoad);
      }
    })();
    </script>

  </body>
</html>
